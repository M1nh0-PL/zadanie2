name: Zadanie 2

on:
push:
branches:
- main
tags:
- 'v*.*.*'

workflow_dispatch:

permissions:
contents: read
packages: write

jobs:
build-test-and-push:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Login to DockerHub
    uses: docker/login-action@v3
    with:
      username: ${{ vars.DOCKERHUB_USERNAME }}
      password: ${{ secrets.DOCKERHUB_TOKEN }}

  - name: Login to GitHub Container Registry
    uses: docker/login-action@v3
    with:
      registry: ghcr.io
      username: ${{ github.actor }}
      password: ${{ secrets.GITHUB_TOKEN }}

  - name: Docker metadata definitions
    id: meta
    uses: docker/metadata-action@v5
    with:
      images: ghcr.io/${{ github.repository_owner }}/zadanie2-obraz
      flavor: |
        latest=false
      tags: |
        type=sha,priority=100,prefix=sha-,format=short
        type=semver,priority=200,pattern={{version}}

  - name: Set up QEMU
    uses: docker/setup-qemu-action@v3

  - name: Set up Docker Buildx
    uses: docker/setup-buildx-action@v3

  - name: Build local image for CVE scanning
    uses: docker/build-push-action@v6
    with:
      context: .
      load: true
      push: false
      tags: local-test-image:latest
      platforms: linux/amd64
      cache-from: type=registry,ref=${{ vars.DOCKERHUB_USERNAME }}/zadanie2-cache:cache

  - name: Run Trivy vulnerability scanner
    uses: aquasecurity/trivy-action@master
    with:
      image-ref: local-test-image:latest
      format: table
      exit-code: '1'
      ignore-unfixed: true
      vuln-type: os,library
      severity: CRITICAL,HIGH

  - name: Build and push Multi-Arch Image to GHCR
    uses: docker/build-push-action@v6
    with:
      context: .
      platforms: linux/amd64,linux/arm64
      push: true
      tags: ${{ steps.meta.outputs.tags }}

      cache-from: |
        type=registry,ref=${{ vars.DOCKERHUB_USERNAME }}/zadanie2-cache:cache

      cache-to: |
        type=registry,ref=${{ vars.DOCKERHUB_USERNAME }}/zadanie2-cache:cache,mode=max
```

