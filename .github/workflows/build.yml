name: Build and Publish Container

on:
workflow_dispatch:

push:
tags:
- "v*"

permissions:
contents: read
packages: write

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout source
    uses: actions/checkout@v4

  - name: Setup QEMU
    uses: docker/setup-qemu-action@v3

  - name: Setup Buildx
    uses: docker/setup-buildx-action@v3

  - name: Login to DockerHub
    uses: docker/login-action@v3
    with:
      username: ${{ vars.DOCKERHUB_USERNAME }}
      password: ${{ secrets.DOCKERHUB_TOKEN }}

  - name: Login to GHCR
    uses: docker/login-action@v3
    with:
      registry: ghcr.io
      username: ${{ github.actor }}
      password: ${{ secrets.GITHUB_TOKEN }}

  - name: Docker metadata
    id: meta
    uses: docker/metadata-action@v5
    with:
      images: ghcr.io/${{ github.repository }}
      flavor: |
        latest=false
      tags: |
        type=sha,prefix=sha-,format=short,priority=100
        type=semver,pattern={{version}},priority=200

  - name: Build image for scan
    uses: docker/build-push-action@v6
    with:
      context: .
      file: ./Dockerfile
      load: true
      push: false
      tags: local-scan:latest
      platforms: linux/amd64

  - name: Scan image with Trivy
    uses: aquasecurity/trivy-action@master
    with:
      image-ref: local-scan:latest
      severity: HIGH,CRITICAL
      exit-code: 1
      ignore-unfixed: true

  - name: Build and Push image
    uses: docker/build-push-action@v6
    with:
      context: .
      file: ./Dockerfile
      push: true
      platforms: linux/amd64,linux/arm64
      tags: ${{ steps.meta.outputs.tags }}

      cache-from: |
        type=registry,ref=${{ vars.DOCKERHUB_USERNAME }}/cache:buildcache

      cache-to: |
        type=registry,ref=${{ vars.DOCKERHUB_USERNAME }}/cache:buildcache,mode=max
```

